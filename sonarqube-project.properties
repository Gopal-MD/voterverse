# SonarQube Project Configuration
# https://docs.sonarqube.org/latest/project-administration/project-key/

sonar.projectKey=Gopal-MD_voterverse
sonar.projectName=VoterVerse
sonar.projectVersion=1.2.0

# Source directories
sonar.sources=frontend/src,backend

# Test directories
sonar.tests=frontend/src/__tests__,frontend/tests/e2e,backend/tests

# File inclusions/exclusions
sonar.inclusions=**/*.js,**/*.jsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.config.js,**/*.config.mjs,**/public/**

# Test file patterns
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Coverage reports
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
# Enforces: 0 blocker issues, ≤2 critical issues, <3% duplicated lines, ≥90% coverage
sonar.qualitygate.wait=true

# SARIF output (consumed by GitHub Security tab)
sonar.sarifReportPaths=sonar-report.sarif
